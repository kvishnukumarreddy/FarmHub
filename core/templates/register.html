{% extends 'base.html' %}

{% block content %}

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.auth-card {
    width: 400px;
    padding: 30px;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.auth-card h2 {
    margin-bottom: 10px;
    color: #2e7d32;
}

.subtitle {
    color: #777;
    font-size: 14px;
    margin-bottom: 20px;
}

.form-group {
    text-align: left;
    margin-bottom: 15px;
}

.form-group label {
    font-weight: 500;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-top: 5px;
}

.form-group input:focus {
    border-color: #2e7d32;
    outline: none;
}

.register-btn {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.register-btn:hover {
    background: #1b5e20;
}

.login-link {
    margin-top: 15px;
    font-size: 14px;
}

.login-link a {
    color: #2e7d32;
    text-decoration: none;
    font-weight: bold;
}

</style>

<div class="auth-container">
    <div class="auth-card">

        <h2>📝 Create Account</h2>
        <p class="subtitle">Join FarmHub today</p>
        <form method="POST">
            {% csrf_token %}
        
            {% if messages %}
                {% for message in messages %}
                    <p style="color:red;">{{ message }}</p>
                {% endfor %}
            {% endif %}
        
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" placeholder="Enter first name" required>
            </div>
        
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" placeholder="Enter last name" required>
            </div>
        
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>
        
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
        
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
        
            <button type="submit" class="register-btn">Register</button>
        </form>

        <p class="login-link">
            Already have account? <a href="/accounts/login/">Login</a>
        </p>

    </div>
</div>

{% endblock %}
