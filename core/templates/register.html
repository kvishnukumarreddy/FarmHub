{% extends 'base.html' %}

{% block content %}

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.auth-card {
    width: 400px;
    padding: 30px;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.auth-card h2 {
    margin-bottom: 10px;
    color: #2e7d32;
}

.subtitle {
    color: #777;
    font-size: 14px;
    margin-bottom: 20px;
}

.form-group {
    text-align: left;
    margin-bottom: 15px;
}

.form-group label {
    font-weight: 500;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-top: 5px;
}

.form-group input:focus {
    border-color: #2e7d32;
    outline: none;
}

.register-btn {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.register-btn:hover {
    background: #1b5e20;
}

.login-link {
    margin-top: 15px;
    font-size: 14px;
}

.login-link a {
    color: #2e7d32;
    text-decoration: none;
    font-weight: bold;
}
button {
    width: 100%;
    padding: 8px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1b5e20;
    transform: scale(0.97);
}
</style>

<div class="auth-container">
    <div class="auth-card">

        <h2>📝 Create Account</h2>
        <p class="subtitle">Join FarmHub today</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password1" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="password2" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="register-btn">Register</button>
        </form>

        <p class="login-link">
            Already have account? <a href="/accounts/login/">Login</a>
        </p>

    </div>
</div>

{% endblock %}
